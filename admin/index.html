<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Admin Login | Mock University</title>
    <link rel="stylesheet" href="/src/styles/main.css">
    <style>
        .admin-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--primary-color), var(--primary-dark));
            padding: 2rem;
        }
        
        .admin-login-card {
            background-color: var(--bg-card);
            border-radius: var(--radius-xl);
            padding: 3rem;
            box-shadow: var(--shadow-xl);
            max-width: 450px;
            width: 100%;
        }
        
        .admin-logo {
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .admin-logo-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 1rem;
            background: linear-gradient(135deg, var(--primary-color), var(--primary-light));
            border-radius: var(--radius-lg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: white;
            box-shadow: var(--shadow-lg);
        }
        
        .admin-title {
            font-size: 2rem;
            text-align: center;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
        }
        
        .admin-subtitle {
            text-align: center;
            color: var(--text-secondary);
            margin-bottom: 2rem;
        }
        
        .alert {
            padding: 1rem;
            border-radius: var(--radius-md);
            margin-bottom: 1rem;
            display: none;
        }
        
        .alert-error {
            background-color: rgba(220, 53, 69, 0.1);
            color: var(--color-live);
            border: 1px solid var(--color-live);
        }
        
        .btn-admin {
            width: 100%;
            padding: 1rem;
            font-size: 1.125rem;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <div class="admin-login-card">
            <div class="admin-logo">
                <div class="admin-logo-icon">🔐</div>
                <h1 class="admin-title">Admin Panel</h1>
                <p class="admin-subtitle">Mock University</p>
            </div>
            
            <div id="alertBox" class="alert alert-error">
                Invalid credentials. Please try again.
            </div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="username" class="form-label">Username</label>
                    <input 
                        type="text" 
                        id="username" 
                        class="form-input" 
                        required
                        autocomplete="username"
                        placeholder="Enter your username"
                    >
                </div>
                
                <div class="form-group">
                    <label for="password" class="form-label">Password</label>
                    <input 
                        type="password" 
                        id="password" 
                        class="form-input" 
                        required
                        autocomplete="current-password"
                        placeholder="Enter your password"
                    >
                </div>
                
                <div class="form-group">
                    <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
                        <input type="checkbox" id="rememberMe" style="width: auto;">
                        <span>Remember me</span>
                    </label>
                </div>
                
                <button type="submit" class="btn btn-primary btn-admin">
                    <span id="loginText">Sign In</span>
                    <span id="loginLoader" style="display: none;">
                        <div class="spinner" style="width: 20px; height: 20px; border-width: 2px;"></div>
                    </span>
                </button>
            </form>
            
            <div style="text-align: center; margin-top: 1.5rem;">
                <a href="/" style="color: var(--primary-color); font-size: 0.875rem;">
                    ← Back to Website
                </a>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../src/config/config.js"></script>
    <script>
        // Admin Login Handler - SECURE VERSION
        class AdminLogin {
            constructor() {
                this.form = document.getElementById('loginForm');
                this.alertBox = document.getElementById('alertBox');
                this.supabase = null;
                this.maxAttempts = 5;
                this.attempts = 0;
                this.lockoutTime = 15 * 60 * 1000; // 15 minutes
                
                this.init();
            }
            
            init() {
                // Initialize Supabase
                if (typeof window.CONFIG !== 'undefined' && window.CONFIG.supabase) {
                    this.supabase = supabase.createClient(
                        CONFIG.supabase.url,
                        CONFIG.supabase.anonKey
                    );
                }
                
                // Check lockout
                this.checkLockout();
                
                // Check if already logged in
                this.checkSession();
                
                // Form submission
                this.form.addEventListener('submit', (e) => this.handleLogin(e));
            }
            
            checkLockout() {
                const lockoutUntil = localStorage.getItem('admin_lockout');
                if (lockoutUntil) {
                    const remaining = parseInt(lockoutUntil) - Date.now();
                    if (remaining > 0) {
                        const minutes = Math.ceil(remaining / 60000);
                        this.showAlert(`Too many failed attempts. Try again in ${minutes} minutes.`);
                        this.form.querySelector('button[type="submit"]').disabled = true;
                        
                        // Auto-enable after lockout expires
                        setTimeout(() => {
                            localStorage.removeItem('admin_lockout');
                            this.form.querySelector('button[type="submit"]').disabled = false;
                            this.hideAlert();
                        }, remaining);
                    } else {
                        localStorage.removeItem('admin_lockout');
                    }
                }
            }
            
            async checkSession() {
                if (!this.supabase) return;
                
                try {
                    const { data: { session }, error } = await this.supabase.auth.getSession();
                    
                    if (error) throw error;
                    
                    if (session && session.user) {
                        // Verify user is actually an admin by checking admin_users table
                        const { data: adminUser, error: adminError } = await this.supabase
                            .from('admin_users')
                            .select('id, role')
                            .eq('email', session.user.email)
                            .single();
                        
                        if (adminError || !adminUser) {
                            // Not an admin, sign out
                            await this.supabase.auth.signOut();
                            return;
                        }
                        
                        // Valid admin session, redirect to dashboard
                        window.location.href = '/admin/dashboard.html';
                    }
                } catch (error) {
                    console.error('Session check error:', error);
                }
            }
            
      async handleLogin(e) {
    e.preventDefault();
    
    // 1. Get values from the form
    const usernameInput = document.getElementById('username').value.trim(); 
    const passwordInput = document.getElementById('password').value;
    
    this.setLoadingState(true);
    this.hideAlert();
    
    try {
        // 2. Lookup the EMAIL associated with this username
        // We do this because Supabase Auth needs an email to sign in
        const { data: adminData, error: dbError } = await this.supabase
            .from('admin_users')
            .select('email')
            .eq('username', usernameInput)
            .maybeSingle(); 

        if (dbError || !adminData) {
            console.error("Database lookup failed:", dbError);
            throw new Error('Invalid username or password');
        }

        // 3. Use the retrieved email to perform the actual login
        // This ensures we send "marcuoji@gmail.com" to the Auth server
       // Add this line inside handleLogin before the sign-in call:
       console.log("Attempting login for:", adminData.email);
        const { data, error: authError } = await this.supabase.auth.signInWithPassword({
            email: adminData.email, 
            password: passwordInput
        });
        
        if (authError) throw authError;

        // 4. Success! Redirect to dashboard
        window.location.href = '/admin/dashboard.html';
        
    } catch (error) {
        console.error('Login error:', error.message);
        this.showAlert(error.message);
    // Track failed attempts
                    this.attempts = parseInt(localStorage.getItem('admin_attempts') || '0') + 1;
                    localStorage.setItem('admin_attempts', this.attempts.toString());
                    
                    if (this.attempts >= this.maxAttempts) {
                        // Lock out user
                        const lockoutUntil = Date.now() + this.lockoutTime;
                        localStorage.setItem('admin_lockout', lockoutUntil.toString());
                        this.showAlert(`Too many failed attempts. Account locked for 15 minutes.`);
                        this.form.querySelector('button[type="submit"]').disabled = true;
                        
                        setTimeout(() => {
                            localStorage.removeItem('admin_lockout');
                            localStorage.removeItem('admin_attempts');
                            this.form.querySelector('button[type="submit"]').disabled = false;
                            this.hideAlert();
                        }, this.lockoutTime);
                    } else {
                        const remaining = this.maxAttempts - this.attempts;
                        this.showAlert(`Invalid credentials. ${remaining} attempt${remaining !== 1 ? 's' : ''} remaining.`);
                    }
                }finally {
        this.setLoadingState(false);
    }
}

// Helper for cleaner code
handleFailure() {
    this.attempts = parseInt(localStorage.getItem('admin_attempts') || '0') + 1;
    localStorage.setItem('admin_attempts', this.attempts.toString());
    
    if (this.attempts >= this.maxAttempts) {
        const lockoutUntil = Date.now() + this.lockoutTime;
        localStorage.setItem('admin_lockout', lockoutUntil.toString());
        this.showAlert(`Too many failed attempts. Locked for 15 mins.`);
    } else {
        this.showAlert(`Invalid credentials. ${this.maxAttempts - this.attempts} attempts left.`);
    }
}
            
            async logActivity(adminId, action, entityType, entityId, details) {
                if (!this.supabase) return;
                
                try {
                    // Get client IP (best effort)
                    let ipAddress = 'unknown';
                    try {
                        const response = await fetch('https://api.ipify.org?format=json');
                        const data = await response.json();
                        ipAddress = data.ip;
                    } catch (e) {
                        // Silently fail
                    }
                    
                    await this.supabase
                        .from('activity_logs')
                        .insert({
                            admin_id: adminId,
                            action: action,
                            entity_type: entityType,
                            entity_id: entityId,
                            details: details,
                            ip_address: ipAddress
                        });
                } catch (error) {
                    console.error('Failed to log activity:', error);
                }
            }
            
            setLoadingState(loading) {
                const loginText = document.getElementById('loginText');
                const loginLoader = document.getElementById('loginLoader');
                const submitBtn = this.form.querySelector('button[type="submit"]');
                
                if (loading) {
                    submitBtn.disabled = true;
                    loginText.style.display = 'none';
                    loginLoader.style.display = 'inline-block';
                } else {
                    submitBtn.disabled = false;
                    loginText.style.display = 'inline';
                    loginLoader.style.display = 'none';
                }
            }
            
            showAlert(message) {
                this.alertBox.textContent = message;
                this.alertBox.style.display = 'block';
            }
            
            hideAlert() {
                this.alertBox.style.display = 'none';
            }
        }
        
        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            new AdminLogin();
        });
    </script>
</body>
</html>
