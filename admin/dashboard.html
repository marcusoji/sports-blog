<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Admin Dashboard | Mock University</title>
    <link rel="stylesheet" href="../src/styles/main.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .admin-layout {display: grid; grid-template-columns: 250px 1fr; min-height: 100vh; background-color: var(--bg-secondary);}
        .admin-sidebar {background-color: var(--bg-card); border-right: 1px solid var(--border-color); padding: 2rem 0;}
        .admin-brand {padding: 0 1.5rem 2rem; border-bottom: 1px solid var(--border-color); margin-bottom: 1rem;}
        .admin-nav {list-style: none;}
        .admin-nav-item {padding: 0;}
        .admin-nav-link {display: flex; align-items: center; gap: 0.75rem; padding: 0.875rem 1.5rem; color: var(--text-secondary); text-decoration: none; transition: all var(--transition-fast); cursor: pointer;}
        .admin-nav-link:hover, .admin-nav-link.active {background-color: var(--bg-secondary); color: var(--primary-color);}
        .admin-main {padding: 2rem; overflow-y: auto;}
        .admin-header {display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem;}
        .admin-title {font-size: 2rem; margin: 0;}
        .admin-actions {display: flex; gap: 1rem; align-items: center;}
        .stats-grid {display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1.5rem; margin-bottom: 2rem;}
        .stat-card {background-color: var(--bg-card); border: 1px solid var(--border-color); border-radius: var(--radius-lg); padding: 1.5rem;}
        .stat-label {font-size: 0.875rem; color: var(--text-secondary); margin-bottom: 0.5rem;}
        .stat-value {font-size: 2rem; font-weight: 700; color: var(--primary-color);}
        .stat-icon {font-size: 2.5rem; margin-bottom: 0.5rem;}
        .content-section {background-color: var(--bg-card); border: 1px solid var(--border-color); border-radius: var(--radius-lg); padding: 2rem; margin-bottom: 2rem;}
        .modal {display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background-color: rgba(0, 0, 0, 0.5); z-index: 9999; align-items: center; justify-content: center;}
        .modal.active {display: flex;}
        .modal-content {background-color: var(--bg-card); border-radius: var(--radius-lg); padding: 2rem; max-width: 600px; width: 90%; max-height: 90vh; overflow-y: auto;}
        .toast-container {position: fixed; bottom: 2rem; right: 2rem; z-index: 10000; display: flex; flex-direction: column; gap: 0.5rem;}
        .toast {background-color: var(--bg-card); border: 1px solid var(--border-color); border-radius: var(--radius-md); padding: 1rem 1.5rem; box-shadow: var(--shadow-lg); animation: slideInRight 0.3s ease-out;}
        .toast.success {border-left: 4px solid var(--color-finished);}
        .toast.error {border-left: 4px solid var(--color-live);}
    </style>
</head>
<body>
    <div id="toastContainer" class="toast-container"></div>
    <div class="admin-layout">
        <aside class="admin-sidebar">
            <div class="admin-brand"><h2 style="margin:0;color:var(--primary-color);">🎓 Admin</h2><p style="font-size:0.875rem;color:var(--text-tertiary);margin:0.25rem 0 0;">Mock University</p></div>
            <nav><ul class="admin-nav">
                <li class="admin-nav-item"><a class="admin-nav-link active" data-section="dashboard"><span>📊</span><span>Dashboard</span></a></li>
                <li class="admin-nav-item"><a class="admin-nav-link" data-section="blog"><span>📝</span><span>Blog Posts</span></a></li>
                <li class="admin-nav-item"><a class="admin-nav-link" data-section="matches"><span>⚽</span><span>Matches</span></a></li>
                <li class="admin-nav-item"><a class="admin-nav-link" data-section="teams"><span>👥</span><span>Teams</span></a></li>
                <li class="admin-nav-item"><a class="admin-nav-link" data-section="activity"><span>📋</span><span>Activity Log</span></a></li>
            </ul></nav>
            <div style="padding:0 1.5rem;margin-top:2rem;"><button id="logoutBtn" class="btn primary" style="width:100%;">Logout</button></div>
        </aside>
        <main class="admin-main">
            <div class="admin-header"><h1 class="admin-title">Dashboard</h1>
                <div class="admin-actions"><button class="theme-toggle">🌙</button><span id="adminUsername">Loading...</span></div>
            </div>
            <div class="stats-grid">
                <div class="stat-card"><div class="stat-icon">📝</div><div class="stat-label">Blog Posts</div><div class="stat-value" id="statPosts">-</div></div>
                <div class="stat-card"><div class="stat-icon">⚽</div><div class="stat-label">Live Matches</div><div class="stat-value" id="statLive">-</div></div>
                <div class="stat-card"><div class="stat-icon">📅</div><div class="stat-label">Fixtures</div><div class="stat-value" id="statFixtures">-</div></div>
                <div class="stat-card"><div class="stat-icon">📧</div><div class="stat-label">Contacts</div><div class="stat-value" id="statContacts">-</div></div>
            </div>
            <div id="dashboardContent"><div class="content-section"><h2>Welcome</h2><p>Admin panel is loading...</p></div></div>
        </main>
    </div>
    <div id="modal" class="modal" role="dialog" aria-modal="true"><div class="modal-content"><h2 id="modalTitle">Modal</h2><div id="modalBody"></div></div></div>
    <script src="/src/config/config.js"></script>
    <script src="/src/scripts/main.js"></script>
    <script src="/src/scripts/admin-dashboard.js"></script>
</body>
</html>
